unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Let the shell control window naming via rename-window; disable tmux's own
# automatic renaming so it doesn't overwrite the shell-driven titles.
setw -g automatic-rename off

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action any
setw -g window-status-bell-style 'fg=red,bold'

# ============================================
# Dark Theme Configuration
# ============================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB"

# Neovim health: snappy <Esc> (no 500ms delay) and let 'autoread' work.
set -sg escape-time 10
set -g focus-events on

# Status bar position
set -g status-position bottom
set -g status-justify left

# Status bar colors - deep dark base with soft text
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Status bar left side - session name
set -g status-left-length 40
set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]'

# Status bar right side - date and time
set -g status-right-length 100
set -g status-right '#[fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e] %Y-%m-%d #[bg=#cba6f7,fg=#1e1e2e,bold] %H:%M '

# Window status format
setw -g window-status-format '#[bg=#313244,fg=#6c7086] #I:#W #[bg=#1e1e2e,fg=#313244]'
setw -g window-status-current-format '#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W #[bg=#1e1e2e,fg=#89b4fa]'

# Window status separator
setw -g window-status-separator ''

# Pane borders - dark surface / blue accent
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Message style - for command prompt
set -g message-style 'bg=#89b4fa fg=#1e1e2e bold'
set -g message-command-style 'bg=#cba6f7 fg=#1e1e2e'

# Pane number display
set -g display-panes-active-colour '#89b4fa'
set -g display-panes-colour '#313244'

# Clock mode
setw -g clock-mode-colour '#89b4fa'

# Copy mode highlighting
setw -g mode-style 'bg=#89b4fa fg=#1e1e2e bold'

# Window activity indicators
setw -g window-status-activity-style 'bg=#fab387 fg=#1e1e2e bold'
setw -g window-status-bell-style 'bg=#f38ba8 fg=#1e1e2e bold'
